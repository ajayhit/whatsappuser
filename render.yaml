services:
  - type: web
    name: whatsapp-api
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_DIR
        value: /opt/render/project/.data/sessions
    disk:
      name: whatsapp-sessions
      mountPath: /opt/render/project/.data
      sizeGB: 1
